service:
  name: statuspage-frontend
  port: 3000
  replicas: 2
  type: ClusterIP

image:
  repository: your-registry/statuspage-frontend
  tag: latest
  pullPolicy: Always

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

existingSecret: "" # Set to "statuspage-frontend-secrets" if you want to mount the frontend secret file

env:
  NEXT_PUBLIC_API_URL: ""
  NEXT_PUBLIC_WS_URL: ""
  NEXT_PUBLIC_APP_URL: ""

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  path: /
  port: 3000

readinessProbe:
  path: /
  port: 3000
