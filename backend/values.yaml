service:
  name: statuspage-backend
  port: 8000
  replicas: 2
  type: ClusterIP

image:
  repository: your-registry/statuspage-backend
  tag: latest
  pullPolicy: Always

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

existingSecret: "statuspage-backend-secrets"

env:
  DATABASE_URL: ""
  USE_NEON_DB: "true"
  USE_CLOUD_REDIS: "true"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  FROM_EMAIL: "no-reply@status.opsdev.in"
  FRONTEND_URL: "https://status.opsdev.in"
  EXPECTED_CNAME_TARGET: "status.opsdev.in"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  path: /health
  port: 8000

readinessProbe:
  path: /health
  port: 8000
